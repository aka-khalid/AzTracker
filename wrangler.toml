name = "aztracker-dev-worker"
main = "src/index.js"
compatibility_date = "2026-05-23"

[placement]
mode = "smart"

[[kv_namespaces]]
binding = "AZTRACKER_DB"
id = "bd7a240d6727457cb1a5338450aa0969"

[[d1_databases]]
binding = "DB"
database_name = "aztracker-dev-db"
database_id = "8e5a0b8c-d5e7-4f2d-a738-388b0c60bb43"
migrations_dir = "migrations"

[[queues.producers]]
binding = "MESSAGE_QUEUE"
queue = "telegram-outbox-dev"

[[queues.consumers]]
queue = "telegram-outbox-dev"
max_batch_size = 30
max_batch_timeout = 1
max_retries = 3

[[queues.producers]]
binding = "SCRAPER_QUEUE"
queue = "scraper-queue-dev"

[[queues.consumers]]
queue = "scraper-queue-dev"
max_batch_size = 10
max_batch_timeout = 1
max_retries = 3

[vars]
GITHUB_OWNER = "aka-khalid"
GITHUB_REPO = "AzTracker"
DEFAULT_USER_PRODUCT_LIMIT = "3"
DAILY_QUEUE_LIMIT = "10000"
ENVIRONMENT = "dev"


[triggers]
crons = []
# crons = ["* * * * *", "0 0 * * *"]

[env.production]
name = "aztracker-prod-worker"

[env.production.vars]
GITHUB_OWNER = "aka-khalid"
GITHUB_REPO = "AzTracker"
DEFAULT_USER_PRODUCT_LIMIT = "3"
DAILY_QUEUE_LIMIT = "10000"
ENVIRONMENT = "production"


[[env.production.kv_namespaces]]
binding = "AZTRACKER_DB"
id = "90fcfcb742fe4d7299087c076bd1ba4d"

[[env.production.d1_databases]]
binding = "DB"
database_name = "aztracker-prod-db"
database_id = "7998ba93-e8ef-42c5-b37b-580e233a2d6a"
migrations_dir = "migrations"

[[env.production.queues.producers]]
binding = "MESSAGE_QUEUE"
queue = "telegram-outbox"

[[env.production.queues.consumers]]
queue = "telegram-outbox"
max_batch_size = 30
max_batch_timeout = 1
max_retries = 3

[[env.production.queues.producers]]
binding = "SCRAPER_QUEUE"
queue = "scraper-queue"

[[env.production.queues.consumers]]
queue = "scraper-queue"
max_batch_size = 10
max_batch_timeout = 1
max_retries = 3

[env.production.triggers]
crons = ["* * * * *"]