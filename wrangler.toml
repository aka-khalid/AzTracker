name = "aztracker-v2"
main = "src/index.js"
compatibility_date = "2026-05-23"

[[kv_namespaces]]
binding = "AZTRACKER_DB"
id = "90fcfcb742fe4d7299087c076bd1ba4d"

[[d1_databases]]
binding = "DB"
database_name = "aztracker-test-db"
database_id = "5ba01682-b844-447d-8498-bc0cac846edd"

[[queues.producers]]
binding = "MESSAGE_QUEUE"
queue = "telegram-outbox"

[[queues.consumers]]
queue = "telegram-outbox"
max_batch_size = 30
max_batch_timeout = 1
max_retries = 3

[[queues.producers]]
binding = "SCRAPER_QUEUE"
queue = "scraper-queue"

[[queues.consumers]]
queue = "scraper-queue"
max_batch_size = 10
max_batch_timeout = 1
max_retries = 3

[vars]
GITHUB_OWNER = "aka-khalid"
GITHUB_REPO = "AzTracker"
DEFAULT_USER_PRODUCT_LIMIT = "3"

[triggers]
crons = []
# crons = ["* * * * *", "0 0 * * *"]

[env.production]
name = "aztracker-v2-prod"

[env.production.vars]
GITHUB_OWNER = "aka-khalid"
GITHUB_REPO = "AzTracker"
DEFAULT_USER_PRODUCT_LIMIT = "3"

# TODO: Create a separate production KV namespace in Cloudflare dashboard
# and replace the ID below. Currently identical to dev — shared KV causes
# data collision between environments (dev tokens leak to prod, etc.)
# Run: npx wrangler kv:namespace create AZTRACKER_DB --env production
[[env.production.kv_namespaces]]
binding = "AZTRACKER_DB"
id = "90fcfcb742fe4d7299087c076bd1ba4d"

[[env.production.d1_databases]]
binding = "DB"
database_name = "aztracker-prod-db"
database_id = "7998ba93-e8ef-42c5-b37b-580e233a2d6a"

[[env.production.queues.producers]]
binding = "MESSAGE_QUEUE"
queue = "telegram-outbox"

[[env.production.queues.consumers]]
queue = "telegram-outbox"
max_batch_size = 30
max_batch_timeout = 1
max_retries = 3

[[env.production.queues.producers]]
binding = "SCRAPER_QUEUE"
queue = "scraper-queue"

[[env.production.queues.consumers]]
queue = "scraper-queue"
max_batch_size = 10
max_batch_timeout = 1
max_retries = 3

[env.production.triggers]
#crons = []
#crons = ["* * * * *", "0 0 * * *"]
crons = ["*/5 * * * *"] // daily rate-limit emergency survival