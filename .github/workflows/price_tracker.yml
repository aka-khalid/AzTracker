name: Amazon Price Tracker

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  track-price:
    runs-on: ubuntu-latest
    # ── THE LOCK GUARD ────────────────────────────────────────────────────────
    # If the bot is writing data, this entire execution skips silently
    if: vars.TRACKER_LOCK != 'true'
    # ──────────────────────────────────────────────────────────────────────────
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price tracker
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          AMAZON_ACCESS_KEY:  ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY:  ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
          AMAZON_API_VERSION: ${{ secrets.AMAZON_API_VERSION }}
        run: python price_tracker.py

      - name: Save prices to repo
        run: |
          git config user.name "price-bot"
          git config user.email "bot@github.com"
          git add prices.json
          git diff --cached --quiet || git commit -m "chore: update prices"
          git push
