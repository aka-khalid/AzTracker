name: Amazon Price Tracker

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  track-price:
    runs-on: ubuntu-latest
    
    # We no longer need write permissions because we save to Cloudflare!
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price tracker
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          ALLOWED_USERS:      ${{ secrets.ALLOWED_USERS }}
          AMAZON_ACCESS_KEY:  ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY:  ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
          AMAZON_API_VERSION: ${{ secrets.AMAZON_API_VERSION }}
          # ── NEW CLOUDFLARE SECRETS ──
          CF_ACCOUNT_ID:      ${{ secrets.CF_ACCOUNT_ID }}
          CF_NAMESPACE_ID:    ${{ secrets.CF_NAMESPACE_ID }}
          CF_API_TOKEN:       ${{ secrets.CF_API_TOKEN }}
        run: python price_tracker.py
        run: python price_tracker.py
        
      # Notice: The "Save prices to repo" git commit block is completely gone!
