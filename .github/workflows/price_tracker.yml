name: Amazon Price Tracker

on:
  workflow_dispatch:

concurrency:
  group: aztracker-price-check
  cancel-in-progress: false
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  track-price:
    runs-on: ubuntu-latest
    
    # We no longer need write permissions because we save to Cloudflare!
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backup KV Price Shards
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          CF_BASE="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces/$CLOUDFLARE_KV_NAMESPACE_ID"
          AUTH="Authorization: Bearer $CLOUDFLARE_API_TOKEN"

          for PREFIX in price history; do
            KEYS=$(curl -s "$CF_BASE/keys?prefix=${PREFIX}:" -H "$AUTH" | jq -r '.result[].name // empty')
            echo "{}" > ${PREFIX}_backup.json
            for KEY in $KEYS; do
              VALUE=$(curl -s "$CF_BASE/values/$KEY" -H "$AUTH")
              ID="${KEY#${PREFIX}:}"
              jq --arg k "$ID" --argjson v "$VALUE" '. + {($k): $v}' ${PREFIX}_backup.json > tmp.json && mv tmp.json ${PREFIX}_backup.json
            done
            echo "✅ ${PREFIX}: $(echo "$KEYS" | grep -c .) shards backed up."
          done

      - name: Upload Price Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kv-prices-backup-${{ github.run_id }}
          path: price_backup.json
          retention-days: 7

      - name: Upload History Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kv-history-backup-${{ github.run_id }}
          path: history_backup.json
          retention-days: 7

      - name: Run price tracker
        env:
          TELEGRAM_BOT_TOKEN:         ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ROOT_ADMIN_IDS:    ${{ secrets.TELEGRAM_ROOT_ADMIN_IDS }}
          AMZN_CREATORS_ACCESS_KEY:   ${{ secrets.AMZN_CREATORS_ACCESS_KEY }}
          AMZN_CREATORS_SECRET_KEY:   ${{ secrets.AMZN_CREATORS_SECRET_KEY }}
          AMZN_ASSOCIATES_TAG:        ${{ secrets.AMZN_ASSOCIATES_TAG }}
          AMZN_API_VERSION:           ${{ secrets.AMZN_API_VERSION }}
          CLOUDFLARE_ACCOUNT_ID:      ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN:       ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python price_tracker.py
