name: Hourly Price Tracker

on:
  schedule:
    - cron: "0 * * * *"   # runs every hour on the hour
  workflow_dispatch:        # lets you trigger it manually from GitHub too

jobs:
  track-price:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price tracker
        env:
          PRODUCT_URL:      ${{ secrets.PRODUCT_URL }}
          PRODUCT_NAME:     ${{ secrets.PRODUCT_NAME }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python price_tracker.py
