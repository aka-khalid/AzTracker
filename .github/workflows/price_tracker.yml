name: Amazon Price Tracker

on:
  workflow_dispatch:

concurrency:
  group: aztracker-price-check
  cancel-in-progress: false
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  track-price:
    runs-on: ubuntu-latest
    
    # We no longer need write permissions because we save to Cloudflare!
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price tracker
        env:
          TELEGRAM_BOT_TOKEN:         ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ROOT_ADMIN_IDS:    ${{ secrets.TELEGRAM_ROOT_ADMIN_IDS }}
          TELEGRAM_PUBLIC_CHANNEL_ID: ${{ secrets.TELEGRAM_PUBLIC_CHANNEL_ID }}
          AMZN_CREATORS_ACCESS_KEY:   ${{ secrets.AMZN_CREATORS_ACCESS_KEY }}
          AMZN_CREATORS_SECRET_KEY:   ${{ secrets.AMZN_CREATORS_SECRET_KEY }}
          AMZN_ASSOCIATES_TAG:        ${{ secrets.AMZN_ASSOCIATES_TAG }}
          AMZN_API_VERSION:           ${{ secrets.AMZN_API_VERSION }}
          CLOUDFLARE_ACCOUNT_ID:      ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN:       ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python price_tracker.py
