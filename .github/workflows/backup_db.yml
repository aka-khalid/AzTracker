name: Cloudflare KV Backup

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Backup KV Price Shards
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          CF_BASE="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces/$CLOUDFLARE_KV_NAMESPACE_ID"
          AUTH="Authorization: Bearer $CLOUDFLARE_API_TOKEN"
        
          for PREFIX in price history; do
            echo "{}" > ${PREFIX}_backup.json
            CURSOR=""
            TOTAL=0
        
            while true; do
              URL="$CF_BASE/keys?prefix=${PREFIX}:"
              if [ -n "$CURSOR" ]; then URL="${URL}&cursor=${CURSOR}"; fi
        
              PAGE=$(curl -s "$URL" -H "$AUTH")
              KEYS=$(echo "$PAGE" | jq -r '.result[].name // empty')
              CURSOR=$(echo "$PAGE" | jq -r '.result_info.cursor // empty')
        
              for KEY in $KEYS; do
                VALUE=$(curl -s "$CF_BASE/values/$KEY" -H "$AUTH")
                ID="${KEY#${PREFIX}:}"
                jq --arg k "$ID" --argjson v "$VALUE" '. + {($k): $v}' ${PREFIX}_backup.json > tmp.json && mv tmp.json ${PREFIX}_backup.json
                TOTAL=$((TOTAL + 1))
              done
        
              if [ -z "$CURSOR" ]; then break; fi
            done
        
            echo "✅ ${PREFIX}: $TOTAL shards backed up."
          done

          # ── DASHBOARD STATS OFFLOAD ──
          # Count the true database size from the backup file
          HIVEMIND_SIZE=$(jq 'length' history_backup.json)
          
          # Fetch the current global:stats payload safely
          STATS_PAGE=$(curl -s "$CF_BASE/values/global:stats" -H "$AUTH")
          if ! echo "$STATS_PAGE" | jq . >/dev/null 2>&1; then STATS_PAGE="{}"; fi
          
          # Inject the new hivemind_size
          NEW_STATS=$(echo "$STATS_PAGE" | jq --argjson hm "$HIVEMIND_SIZE" '.hivemind_size = $hm')
          
          # Push the atomic update back to KV
          curl -s -X PUT "$CF_BASE/values/global:stats" \
               -H "$AUTH" \
               -H "Content-Type: application/json" \
               -d "$NEW_STATS"
               
          echo "✅ Dashboard hivemind_size securely updated to: $HIVEMIND_SIZE"

      - name: Upload Price Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kv-prices-backup-${{ github.run_id }}
          path: price_backup.json
          retention-days: 7

      - name: Upload History Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kv-history-backup-${{ github.run_id }}
          path: history_backup.json
          retention-days: 7
