name: Deploy Cloudflare Worker
on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
    paths:
      - 'src/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy_worker.yml'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Apply Database Migrations (Development)
        if: github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/heads/feature/')
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.92.0"
          command: d1 migrations apply DB --remote

      - name: Deploy to Cloudflare Workers (Development)
        if: github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/heads/feature/')
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.92.0"

      - name: Apply Database Migrations (Production)
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.92.0"
          command: d1 migrations apply DB --env production --remote

      - name: Deploy to Cloudflare Workers (Production)
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.92.0"
          command: deploy --env production
