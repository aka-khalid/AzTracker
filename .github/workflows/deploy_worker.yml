name: Deploy Cloudflare Worker
on:
  push:
    branches:
      - main
      - feature/randomized-scheduler
    paths:
      - 'worker.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy_worker.yml'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: "4.92.0"

      - name: Upload Worker Secrets
        run: |
          echo "${{ secrets.TELEGRAM_TOKEN }}" | npx wrangler secret put TELEGRAM_TOKEN --name aztracker-bot
          echo "${{ secrets.ALLOWED_USERS }}" | npx wrangler secret put ALLOWED_USERS --name aztracker-bot
          echo "${{ secrets.SCHEDULER_SECRET }}" | npx wrangler secret put SCHEDULER_SECRET --name aztracker-bot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
