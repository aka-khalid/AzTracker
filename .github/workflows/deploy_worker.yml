name: Deploy Cloudflare Worker
on:
  push:
    branches:
      - main
      - feature/randomized-scheduler
    paths:
      - 'worker.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy_worker.yml'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.92.0"

      - name: Upload Worker Secrets
        run: |
          echo "${{ secrets.TELEGRAM_BOT_TOKEN }}" | npx wrangler secret put TELEGRAM_BOT_TOKEN --name aztracker-bot
          echo "${{ secrets.TELEGRAM_ROOT_ADMIN_IDS }}" | npx wrangler secret put TELEGRAM_ROOT_ADMIN_IDS --name aztracker-bot
          echo "${{ secrets.CRON_AUTH_KEY }}" | npx wrangler secret put CRON_AUTH_KEY --name aztracker-bot
          echo "${{ secrets.GH_WORKFLOW_TOKEN }}" | npx wrangler secret put GH_WORKFLOW_TOKEN --name aztracker-bot
          echo "${{ secrets.TELEGRAM_WEBHOOK_SECRET }}" | npx wrangler secret put TELEGRAM_WEBHOOK_SECRET --name aztracker-bot
          echo "${{ secrets.AMZN_ASSOCIATES_TAG }}" | npx wrangler secret put AMZN_ASSOCIATES_TAG --name aztracker-bot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
