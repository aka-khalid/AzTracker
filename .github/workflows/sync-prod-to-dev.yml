name: Sync Prod to Dev

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Export Prod D1 Data
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Export the data only (no schema)
          npx wrangler d1 export DB --env production --remote --output=prod_data.sql --no-schema

      - name: Transform INSERT to INSERT OR REPLACE
        run: |
          # Replace 'INSERT INTO' with 'INSERT OR REPLACE INTO' to safely merge rows 
          # without violating unique constraints or dropping tables.
          sed -i 's/INSERT INTO/INSERT OR REPLACE INTO/g' prod_data.sql

      - name: Import into Dev D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Execute the transformed SQL on the Dev DB
          npx wrangler d1 execute DB --remote --file=prod_data.sql

      - name: Sync KV Namespaces
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          node scripts/sync-kv.js
